kind = "web"
previewPath = "/"
title = "NevrFade — Premium Streetwear"
version = "1.0.0"
id = "artifacts/nevr-fade"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25460

[services.development]
run = "pnpm --filter @workspace/nevr-fade run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nevr-fade", "run", "build" ]
publicDir = "artifacts/nevr-fade/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25460"
BASE_PATH = "/"
